<!-- =============================================
     MODUL: Navigation
     Datei: modules/01_nav.html
     Ändern: Logo, Nav-Links, Sprachen
     Einfügen: in index.html via <include> oder copy-paste
     ============================================= -->
<style>
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 0 var(--pad-h);
}
.nav-inner {
  max-width: var(--max-width); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo {
  font-family: var(--font-mono); font-size: 14px;
  font-weight: 500; letter-spacing: 0.04em; color: var(--text);
}
.logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2rem; align-items: center; }
.nav-links a { font-size: 13px; color: var(--text2); letter-spacing: 0.02em; transition: color .2s; }
.nav-links a:hover { color: var(--text); }
.btn-nav {
  font-size: 13px; padding: 7px 18px; border-radius: var(--radius);
  background: var(--accent); color: #fff; border: none; cursor: pointer; transition: opacity .2s;
}
.btn-nav:hover { opacity: .85; }
@media (max-width: 768px) {
  .nav-links a { display: none; }
}
</style>

<nav>
  <div class="nav-inner">
    <!-- LOGO: hier ändern -->
    <div class="logo">OS.<span>CNC</span> Mechplast</div>

    <div class="nav-links">
      <!-- NAV-LINKS: data-key verweist auf js/translations.js -->
      <a href="#leistungen" data-key="nav_services"></a>
      <a href="#branchen"   data-key="nav_industries"></a>
      <a href="#team"       data-key="nav_team"></a>

      <!-- SPRACHUMSCHALTER: neue Sprache = neuen Button + Block in translations.js -->
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="de" onclick="setLang('de')">DE</button>
        <button class="lang-btn"        data-lang="it" onclick="setLang('it')">IT</button>
        <button class="lang-btn"        data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        data-lang="fr" onclick="setLang('fr')">FR</button>
      </div>

      <button class="btn-nav" data-key="nav_cta"
        onclick="document.getElementById('kontakt').scrollIntoView({behavior:'smooth'})">
      </button>
    </div>
  </div>
</nav>
