<style>
.machines-section { background: var(--bg); }
.machines-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border); border: 1px solid var(--border);
}
.machine-card {
  background: var(--white); padding: 2rem 1.75rem;
  position: relative; transition: background .2s;
}
.machine-card:hover { background: var(--bg2); }
.machine-accent {
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--accent);
}
.machine-num {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text2); margin-bottom: 1.25rem; letter-spacing: 0.08em;
}
.machine-card h3 {
  font-family: var(--font-display); font-size: 22px;
  font-weight: 500; margin-bottom: .75rem; color: var(--text);
}
.machine-card p { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 1.25rem; }
.machine-specs { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.machine-specs li {
  font-family: var(--font-mono); font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.machine-specs li::before { content: '—'; color: var(--accent); flex-shrink: 0; }

@media (max-width: 768px) { .machines-grid { grid-template-columns: 1fr; } }
</style>

      </div>
    </div>

    <div class="machines-grid">

        <ul class="machine-specs">
