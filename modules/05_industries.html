<style>

  padding: 1.5rem; border-radius: var(--radius);
  display: flex; flex-direction: column; gap: .5rem;
  transition: all .2s; cursor: default;
}
.ind-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.ind-icon {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent); letter-spacing: 0.06em;
}
.ind-card h4 { font-size: 15px; font-weight: 500; }
.ind-card p  { font-size: 13px; color: var(--text2); line-height: 1.6; }

@media (max-width: 768px) { .industries-grid { grid-template-columns: 1fr 1fr; } }
