<!-- ════════ MODUL: MASCHINENPARK ════════
     Neue Maschine: eine <article class="mach-card"> duplizieren,
     Keys (m4_...) in js/translations.js für alle 4 Sprachen ergänzen. -->
<div class="container">
  <div class="sec-head">
    <span class="kicker" data-key="mach_kicker"></span>
    <h2 class="sec-title" data-key="mach_title"></h2>
    <p class="sec-lead" data-key="mach_lead"></p>
  </div>
  <div class="mach-grid">
    <article class="mach-card">
      <span class="mach-tag" data-key="m1_tag"></span>
      <h3>Hyundai WIA HD2200SY</h3>
      <p class="mach-sub" data-key="m1_sub"></p>
      <dl>
        <div><dt data-key="m_spec_type"></dt><dd data-key="m1_type"></dd></div>
        <div><dt data-key="m_spec_feat"></dt><dd data-key="m1_feat"></dd></div>
        <div><dt data-key="m_spec_year"></dt><dd>2023</dd></div>
      </dl>
    </article>
    <article class="mach-card">
      <span class="mach-tag" data-key="m2_tag"></span>
      <h3>Hyundai WIA L210LMA</h3>
      <p class="mach-sub" data-key="m2_sub"></p>
      <dl>
        <div><dt data-key="m_spec_type"></dt><dd data-key="m2_type"></dd></div>
        <div><dt data-key="m_spec_feat"></dt><dd data-key="m2_feat"></dd></div>
        <div><dt data-key="m_spec_count"></dt><dd>2×</dd></div>
      </dl>
    </article>
    <article class="mach-card">
      <span class="mach-tag" data-key="m3_tag"></span>
      <h3 data-key="m3_t"></h3>
      <p class="mach-sub" data-key="m3_sub"></p>
      <dl>
        <div><dt data-key="m3_d1"></dt><dd data-key="m3_v1"></dd></div>
        <div><dt data-key="m3_d2"></dt><dd data-key="m3_v2"></dd></div>
        <div><dt data-key="m3_d3"></dt><dd data-key="m3_v3"></dd></div>
      </dl>
    </article>
  </div>
  <div class="mach-note">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6FA8F5" stroke-width="2" style="flex:none;margin-top:2px"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r=".5" fill="#6FA8F5"/></svg>
    <span data-key="mach_note"></span>
  </div>
</div>
